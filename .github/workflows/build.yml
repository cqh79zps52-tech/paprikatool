name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows (x64)
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Configure (MSVC)
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test
        run: .\build\Release\paprika.exe --version

      - name: Stage artifact
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build\Release\paprika.exe dist\paprika.exe

      - uses: actions/upload-artifact@v4
        with:
          name: paprika-windows-x64
          path: dist/paprika.exe

  macos:
    name: macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (clang, universal)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test
        run: ./build/paprika --version

      - name: Verify universal binary
        run: lipo -info ./build/paprika

      - name: Stage bare binary
        run: |
          mkdir -p dist
          cp build/paprika dist/paprika

      - uses: actions/upload-artifact@v4
        with:
          name: paprika-macos-universal
          path: dist/paprika

      - name: Build DMG
        run: cmake --build build --target paprika_dmg

      - uses: actions/upload-artifact@v4
        with:
          name: paprika-macos-dmg
          path: build/dist/Paprika-Tool-*.dmg

  release:
    name: Attach to release
    needs: [windows, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package
        run: |
          mkdir -p release
          cp artifacts/paprika-windows-x64/paprika.exe release/paprika-windows-x64.exe
          cp artifacts/paprika-macos-universal/paprika release/paprika-macos-universal
          chmod +x release/paprika-macos-universal
          cp artifacts/paprika-macos-dmg/Paprika-Tool-*.dmg release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
